<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo</title>
  </head>
  <body>
    <div id="root"></div>
    <style>
      .ribbon {
        position: fixed;
        top: 42px;
        width: 200px;
        padding: 1px 0;
        background: #000;
        color: #eee;
        -moz-box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        -webkit-box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        right: -42px;
        -moz-transform: rotate(45deg);
        -webkit-transform: rotate(45deg);
        -o-transform: rotate(45deg);
        -ms-transform: rotate(45deg);
        transform: rotate(45deg);
      }
      .ribbon a,
      .ribbon a:visited,
      .ribbon a:active,
      .ribbon a:hover {
        display: block;
        padding: 1px 0;
        height: 24px;
        line-height: 24px;
        color: inherit;
        text-align: center;
        text-decoration: none;
        font-family: 'Cabin Condensed', sans-serif;
        font-size: 16px;
        font-weight: 500;
        border: 1px solid rgba(255, 255, 255, 0.3);
        -moz-text-shadow: 0 0 10px rgba(0, 0, 0, 0.31);
        -webkit-text-shadow: 0 0 10px rgba(0, 0, 0, 0.31);
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.31);
      }
    </style>
    <div class="ribbon">
      <a href="https://github.com/ha0z1/idmp">Fork me on GitHub</a>
    </div>
    <script type="module" src="/demo/main.tsx"></script>
  </body>
</html>
